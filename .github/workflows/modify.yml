name: Update Modified Files

on:
  workflow_dispatch:

jobs:
  update-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write RedirectHelper.kt
        run: |
          mkdir -p "$(dirname 'app/src/main/java/com/livetvpro/app/utils/RedirectHelper.kt')"
          echo '' | base64 -d > 'app/src/main/java/com/livetvpro/app/utils/RedirectHelper.kt'
      - name: Write LiveEventsFragment.kt
        run: |
          mkdir -p "$(dirname 'app/src/main/java/com/livetvpro/app/ui/live/LiveEventsFragment.kt')"
          echo '' | base64 -d > 'app/src/main/java/com/livetvpro/app/ui/live/LiveEventsFragment.kt'
      - name: Write FavoritesFragment.kt
        run: |
          mkdir -p "$(dirname 'app/src/main/java/com/livetvpro/app/ui/favorites/FavoritesFragment.kt')"
          echo '' | base64 -d > 'app/src/main/java/com/livetvpro/app/ui/favorites/FavoritesFragment.kt'
      - name: Write CategoryChannelsFragment.kt
        run: |
          mkdir -p "$(dirname 'app/src/main/java/com/livetvpro/app/ui/categories/CategoryChannelsFragment.kt')"
          echo '' | base64 -d > 'app/src/main/java/com/livetvpro/app/ui/categories/CategoryChannelsFragment.kt'
      - name: Write SportsFragment.kt
        run: |
          mkdir -p "$(dirname 'app/src/main/java/com/livetvpro/app/ui/sports/SportsFragment.kt')"
          echo '' | base64 -d > 'app/src/main/java/com/livetvpro/app/ui/sports/SportsFragment.kt'
      - name: Write HomeFragment.kt
        run: |
          mkdir -p "$(dirname 'app/src/main/java/com/livetvpro/app/ui/home/HomeFragment.kt')"
          echo '' | base64 -d > 'app/src/main/java/com/livetvpro/app/ui/home/HomeFragment.kt'
      - name: Write SupportDialog.kt
        run: |
          mkdir -p "$(dirname 'app/src/main/java/com/livetvpro/app/ui/dialogs/SupportDialog.kt')"
          echo '' | base64 -d > 'app/src/main/java/com/livetvpro/app/ui/dialogs/SupportDialog.kt'
      - name: Write WebActivity.kt
        run: |
          mkdir -p "$(dirname 'app/src/main/java/com/livetvpro/app/ui/webview/WebActivity.kt')"
          echo '' | base64 -d > 'app/src/main/java/com/livetvpro/app/ui/webview/WebActivity.kt'

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            'app/src/main/java/com/livetvpro/app/utils/RedirectHelper.kt' \
            'app/src/main/java/com/livetvpro/app/ui/live/LiveEventsFragment.kt' \
            'app/src/main/java/com/livetvpro/app/ui/favorites/FavoritesFragment.kt' \
            'app/src/main/java/com/livetvpro/app/ui/categories/CategoryChannelsFragment.kt' \
            'app/src/main/java/com/livetvpro/app/ui/sports/SportsFragment.kt' \
            'app/src/main/java/com/livetvpro/app/ui/home/HomeFragment.kt' \
            'app/src/main/java/com/livetvpro/app/ui/dialogs/SupportDialog.kt' \
            'app/src/main/java/com/livetvpro/app/ui/webview/WebActivity.kt'
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update redirect logic and fragment ad gate"
          git push
